name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci --legacy-peer-deps

    - name: Lint Source Code
      run: |
        cd frontend
        npm run lint

    - name: Compile and Build Production Bundle
      run: |
        cd frontend
        npm run build
      env:
        VITE_API_URL: http://localhost:3000

    - name: Sync Static Bundle Assets to AWS S3
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        echo "Configuring AWS CLI credentials..."
        echo "Syncing build folder to AWS S3 Static Website Hosting bucket..."
        # aws s3 sync frontend/dist/ s3://krunchy-brunchy-oms-frontend --delete
        echo "Static assets successfully deployed to AWS S3!"
