name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci --legacy-peer-deps

    - name: Lint Source Code
      run: |
        cd frontend
        npm run lint

    - name: Set API URL based on Branch
      run: |
        if [ "${{ github.ref_name }}" = "main" ]; then
          echo "VITE_API_URL=${{ secrets.PRODUCTION_API_URL }}" >> $GITHUB_ENV
        else
          echo "VITE_API_URL=${{ secrets.STAGING_API_URL }}" >> $GITHUB_ENV
        fi

    - name: Compile and Build Production Bundle
      run: |
        cd frontend
        npm run build

    - name: Deploy to Cloudflare Pages
      if: github.event_name == 'push'
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy frontend/dist --project-name=krunchy-brunchy --branch=${{ github.ref_name }}
