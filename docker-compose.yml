version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: oms_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: development_password
      POSTGRES_DB: oms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: oms_backend
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - DATABASE_HOST=postgres-db
      - DATABASE_PORT=5432
      - DATABASE_USER=admin
      - DATABASE_PASSWORD=development_password
      - DATABASE_NAME=oms_db
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
    depends_on:
      - postgres-db

  frontend-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: oms_frontend
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend-api

volumes:
  postgres_data:
