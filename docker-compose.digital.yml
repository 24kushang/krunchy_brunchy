version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: oms_postgres_prod
    environment:
      POSTGRES_USER: ${DATABASE_USER:-admin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-production_secure_db_password}
      POSTGRES_DB: ${DATABASE_NAME:-oms_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: oms_backend_prod
    ports:
      - "3000:3000"
    environment:
      - DATABASE_HOST=${DATABASE_HOST:-postgres-db}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${DATABASE_USER:-admin}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-production_secure_db_password}
      - DATABASE_NAME=${DATABASE_NAME:-oms_db}
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
    depends_on:
      - postgres-db
    restart: always

  frontend-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: oms_frontend_prod
    ports:
      - "80:80"
    depends_on:
      - backend-api
    restart: always

volumes:
  postgres_data_prod:
